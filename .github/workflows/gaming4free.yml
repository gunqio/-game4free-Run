name: Gaming4free Auto Renew

on:
  schedule:
    - cron: '0 */2 * * *'  # 每 2 小时自动运行一次
  workflow_dispatch:       # 保持手动触发，方便随时测试

permissions:
  contents: write
  actions: write           # 删除 workflow runs 需要此权限

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
      # 1. 先检出你自己的仓库（存放工作流文件和原有配置）
      - name: Checkout own repo
        uses: actions/checkout@v4

      # 2. 下载私库脚本（gunqio/zhiyong）到 private 目录
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      # 3. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests

      - name: Setup Chrome
        run: |
          seleniumbase install chromedriver

      # 4. 代理隧道（Xray-core）配置
      - name: Setup Proxy Tunnel (Xray-core)
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray
          chmod +x xray/xray
          printenv XRAY_CONFIG > xray/config.json
          nohup ./xray/xray run -c xray/config.json > xray.log 2>&1 &
          sleep 5
          if ! pgrep -x "xray" > /dev/null; then
              echo "❌ Xray 进程未启动或已崩溃！查看报错日志："
              cat xray.log
              exit 1
          fi
          curl -il -x socks5://127.0.0.1:10808 https://api.ipify.org || (echo "❌ 代理测试失败" && cat xray.log && exit 1)

      # 5. 运行续期脚本（循环续期至47小时，完成后发送汇总通知）
      - name: Run Script
        env:
          PROXY: socks5://127.0.0.1:10808
          TG_TOKEN: ${{ secrets.TG_TOKEN }}      
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  
          SERVERS: ${{ secrets.SERVERS }}  
        run: |
          cd private && xvfb-run -a python aming444fr.py

      # 6. 清理旧的 Workflow Runs，只保留最新 3 个
      - name: 🧹 清理旧运行记录（保留最新 3 个）
        run: |
          echo "📋 正在获取所有运行记录..."
          # 列出所有 runs，跳过最新 3 个，删除其余的
          gh run list --limit 100 --json databaseId --jq '.[].databaseId' | tail -n +4 | while read id; do
            echo "🗑️ 删除运行记录 ID: $id"
            echo "y" | gh run delete "$id"   # 自动确认删除
          done
          echo "✅ 清理完成，仅保留最新 3 条记录。"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
