name: Gaming4free Auto Renew

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests

    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Download sing-box
      run: |
        wget -q https://github.com/SagerNet/sing-box/releases/download/v1.8.6/sing-box-1.8.6-linux-amd64.tar.gz
        tar -xzf sing-box-1.8.6-linux-amd64.tar.gz
        sudo mv sing-box-1.8.6-linux-amd64/sing-box /usr/local/bin/
        chmod +x /usr/local/bin/sing-box

    - name: Generate sing-box config
      env:
        PROXY_URL: ${{ secrets.PROXY }}
      run: |
        python3 -c "import os, json, sys; from urllib.parse import urlparse, parse_qs; \
        proxy_url = os.environ.get('PROXY_URL', ''); \
        print('Proxy URL configured:', bool(proxy_url))"

    - name: Start sing-box proxy
      run: |
        nohup sing-box run -c /tmp/config.json > sing-box.log 2>&1 &
        sleep 5
        echo 'Testing proxy...'
        curl -x socks5://127.0.0.1:1080 https://api.ipify.org -s -o /dev/null -w '出口IP: %{remote_ip}\n' || echo 'Proxy test failed'

    - name: Pull script from private repository
      env:
        REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
      run: |
        wget -q --header='Authorization: token ${REPO_TOKEN}' \
          https://raw.githubusercontent.com/gunqio/zhiyong/main/gaming4free.py \
          -O gaming4free.py
        ls -l gaming4free.py

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:1080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        SERVERS: ${{ secrets.SERVERS }}
      run: |
        xvfb-run -a python gaming4free.py

    - name: Cleanup workflow runs
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        KEEP=3
        CURRENT_RUN_ID="${{ github.run_id }}"
        echo '开始清理...'
        runs_json=$(gh run list --limit 500 --json databaseId,workflowName)
        echo "$runs_json" | jq -c --argjson keep "$KEEP" '
          group_by(.workflowName) | .[] | {
            workflow: .[0].workflowName,
            to_delete: .[$keep:] | map(.databaseId)
          }
        ' | while read -r obj; do
          wf_name=$(echo "$obj" | jq -r '.workflow')
          to_delete=$(echo "$obj" | jq -r '.to_delete[]')
          if [ -z "$to_delete" ]; then
            echo "工作流 '$wf_name' 无需清理。"
            continue
          fi
          for run_id in $to_delete; do
            if [ "$run_id" == "$CURRENT_RUN_ID" ]; then
              continue
            fi
            echo "删除运行 ID: $run_id"
            gh run delete $run_id
          done
        done
        echo '清理完成！'
