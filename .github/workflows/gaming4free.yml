name: Gaming4free Auto Renew

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write          # 👈 新增：删除 workflow runs 需要此权限

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout own repo
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests

      - name: Setup Chrome
        run: |
          seleniumbase install chromedriver

      - name: Setup Proxy Tunnel (Xray-core)
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray
          chmod +x xray/xray
          printenv XRAY_CONFIG > xray/config.json
          nohup ./xray/xray run -c xray/config.json > xray.log 2>&1 &
          sleep 5
          if ! pgrep -x "xray" > /dev/null; then
              echo "❌ Xray 进程未启动或已崩溃！查看报错日志："
              cat xray.log
              exit 1
          fi
          curl -il -x socks5://127.0.0.1:10808 https://api.ipify.org || (echo "❌ 代理测试失败" && cat xray.log && exit 1)

      - name: Run Script
        env:
          PROXY: socks5://127.0.0.1:10808
          TG_TOKEN: ${{ secrets.TG_TOKEN }}      
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  
          SERVERS: ${{ secrets.SERVERS }}  
        run: |
          cd private && xvfb-run -a python aming444fr.py

      # 👇 新增步骤：清理旧的 Workflow Runs，只保留最新 3 个
      - name: 🧹 清理旧运行记录（保留最新 3 个）
        run: |
          echo "📋 正在获取所有运行记录..."
          # 列出所有 runs（按创建时间降序），取前 100 个，获取 databaseId
          # tail -n +4 跳过前 3 个（最新），删除剩余的
          gh run list --limit 100 --json databaseId --jq '.[].databaseId' | tail -n +4 | while read id; do
            echo "🗑️ 删除运行记录 ID: $id"
            gh run delete "$id" --yes
          done
          echo "✅ 清理完成，仅保留最新 3 条记录。"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 默认 token，已具有 actions:write 权限
