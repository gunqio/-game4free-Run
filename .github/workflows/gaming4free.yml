name: Gaming4free Auto Renew

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests

    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Download sing-box
      run: |
        wget -q https://github.com/SagerNet/sing-box/releases/download/v1.8.6/sing-box-1.8.6-linux-amd64.tar.gz
        tar -xzf sing-box-1.8.6-linux-amd64.tar.gz
        sudo mv sing-box-1.8.6-linux-amd64/sing-box /usr/local/bin/
        chmod +x /usr/local/bin/sing-box

    - name: Generate sing-box config
      env:
        PROXY_URL: ${{ secrets.PROXY }}
      run: |
        python3 << 'PYEOF'
        import os, json, sys
        from urllib.parse import urlparse, parse_qs

        proxy_url = os.environ.get('PROXY_URL', '')
        if not proxy_url:
            print('PROXY_URL not set', file=sys.stderr)
            sys.exit(1)

        parsed = urlparse(proxy_url)
        protocol = parsed.scheme
        host = parsed.hostname
        port = parsed.port or 443
        uuid = parsed.username
        if not uuid:
            print('Missing UUID in PROXY_URL', file=sys.stderr)
            sys.exit(1)

        query = parse_qs(parsed.query)
        security = query.get('security', [''])[0]
        sni = query.get('sni', [''])[0] or host
        fp = query.get('fp', ['chrome'])[0]
        flow = query.get('flow', [''])[0]
        transport_type = query.get('type', [''])[0]
        ws_host = query.get('host', [''])[0]
        ws_path = query.get('path', [''])[0]

        outbound = {
            "type": protocol,
            "tag": "proxy",
            "server": host,
            "server_port": port,
            "uuid": uuid,
            "security
