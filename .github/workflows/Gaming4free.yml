name: Gaming4free Auto Renew

on:
  workflow_dispatch:          # 手动触发

permissions:
  contents: write
  actions: write              # 允许删除运行记录

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests

    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Setup Proxy Tunnel (Gost)
      env:
        PROXY_URL: ${{ secrets.PROXY }}
      run: |
        wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
        gunzip gost-linux-amd64-2.11.5.gz
        chmod +x gost-linux-amd64-2.11.5
        nohup ./gost-linux-amd64-2.11.5 -L :1080 -F "${PROXY_URL}" > gost.log 2>&1 &
        sleep 5
        curl -il -x socks5://127.0.0.1:1080 https://api.ipify.org

    - name: Pull script from private repository
      env:
        REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
      run: |
        wget -q --header="Authorization: token ${REPO_TOKEN}" \
             https://raw.githubusercontent.com/gunqio/zhiyong/main/gaming4free.py \
             -O gaming4free.py
        ls -l gaming4free.py

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:1080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        SERVERS: ${{ secrets.SERVERS }}
      run: |
        xvfb-run -a python gaming4free.py

    # ==================== 清理所有工作流的旧运行记录 ====================
    - name: Cleanup all workflow runs (keep latest 3 per workflow)
      if: always()               # 无论续期成功与否都执行清理
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        KEEP=3
        CURRENT_RUN_ID="${{ github.run_id }}"

        echo "📋 开始清理所有工作流的运行记录，每个工作流保留最近 $KEEP 条。"

        # 获取所有工作流（名称和 ID）
        workflows=$(gh workflow list --all --json name,id --jq '.[] | "\(.name)|\(.id)"')

        echo "$workflows" | while IFS='|' read -r wf_name wf_id; do
          if [ -z "$wf_name" ]; then
            continue
          fi

          echo ""
          echo "▶️ 正在处理工作流: $wf_name (ID: $wf_id)"

          # 获取该工作流的所有运行 ID（按时间倒序）
          run_ids=$(gh run list --workflow "$wf_name" --limit 100 --json databaseId --jq '.[].databaseId')

          ids_array=($run_ids)
          total=${#ids_array[@]}

          if [ $total -le $KEEP ]; then
            echo "   ✅ 运行记录数量 ($total) 不超过 $KEEP，跳过。"
            continue
          fi

          # 需要删除的 ID 列表（从第 KEEP+1 个开始）
          to_delete=("${ids_array[@]:$KEEP}")

          echo "   📦 共有 $total 条记录，将删除 ${#to_delete[@]} 条旧记录。"

          for run_id in "${to_delete[@]}"; do
            # 跳过当前正在运行的记录（防止误删）
            if [ "$run_id" == "$CURRENT_RUN_ID" ]; then
              echo "   ⏭️ 跳过当前运行 ID: $run_id（属于当前工作流）"
              continue
            fi
            echo "   🗑️ 删除运行 ID: $run_id"
            gh run delete $run_id
            echo "   ✅ 删除成功"
          done
        done

        echo ""
        echo "✅ 所有工作流清理完成！"
