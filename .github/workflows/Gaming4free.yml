name: Gaming4free Auto Renew

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write              # 允许删除运行记录

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests

    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    # ==================== 替换为 sing-box 代理 ====================
    - name: Setup Proxy (sing-box)
      env:
        # PROXY_URL 请使用 vless:// 格式，例如：
        # vless://uuid@host:port?encryption=none&security=tls&sni=example.com&fp=chrome&flow=xtls-rprx-vision
        PROXY_URL: ${{ secrets.PROXY }}
      run: |
        # 下载 sing-box（固定版本 v1.8.6，可更换为最新版）
        wget -q https://github.com/SagerNet/sing-box/releases/download/v1.8.6/sing-box-1.8.6-linux-amd64.tar.gz
        tar -xzf sing-box-1.8.6-linux-amd64.tar.gz
        mv sing-box-1.8.6-linux-amd64/sing-box /usr/local/bin/
        chmod +x /usr/local/bin/sing-box

        # 生成 sing-box 配置文件（从 PROXY_URL 解析）
        cat > /tmp/gen_config.py <<'EOF'
import os, json, sys
from urllib.parse import urlparse, parse_qs

proxy_url = os.environ.get('PROXY_URL', '')
if not proxy_url:
    print('PROXY_URL not set', file=sys.stderr)
    sys.exit(1)
parsed = urlparse(proxy_url)
protocol = parsed.scheme  # 仅支持 vless，如需 vmess 请自行修改
host = parsed.hostname
port = parsed.port or (443 if protocol == 'vless' else 80)
uuid = parsed.username
if not uuid:
    print('Missing UUID in PROXY_URL', file=sys.stderr)
    sys.exit(1)
query = parse_qs(parsed.query)
# 提取常用参数
security = query.get('security', [''])[0]
sni = query.get('sni', [''])[0]
fp = query.get('fp', ['chrome'])[0]
flow = query.get('flow', [''])[0]

outbound = {
    "type": protocol,
    "tag": "proxy",
    "server": host,
    "server_port": port,
    "uuid": uuid,
    "security": security if security else "none",
    "cipher": "auto",
    "tls": {
        "enabled": bool(security),
        "server_name": sni or host,
        "insecure": False,
        "utls": {
            "enabled": True,
            "fingerprint": fp
        }
    }
}
if protocol == 'vless' and flow:
    outbound['flow'] = flow

config = {
    "log": {"level": "error"},
    "inbounds": [
        {
            "type": "socks",
            "tag": "socks-in",
            "listen": "127.0.0.1",
            "listen_port": 1080,
            "users": []
        }
    ],
    "outbounds": [outbound],
    "route": {
        "rules": [
            {
                "outbound": "proxy",
                "network": ["tcp", "udp"]
            }
        ],
        "final": "proxy"
    }
}
with open('/tmp/config.json', 'w') as f:
    json.dump(config, f, indent=2)
EOF

        python3 /tmp/gen_config.py
        # 启动 sing-box 并后台运行
        nohup sing-box run -c /tmp/config.json > sing-box.log 2>&1 &
        sleep 5
        # 验证代理是否正常
        curl -il -x socks5://127.0.0.1:1080 https://api.ipify.org
    # =============================================================

    - name: Pull script from private repository
      env:
        REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
      run: |
        wget -q --header="Authorization: token ${REPO_TOKEN}" \
             https://raw.githubusercontent.com/gunqio/zhiyong/main/gaming4free.py \
             -O gaming4free.py
        ls -l gaming4free.py

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:1080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        SERVERS: ${{ secrets.SERVERS }}
      run: |
        xvfb-run -a python gaming4free.py

    # ==================== 清理所有工作流的旧运行记录（不变） ====================
    - name: Cleanup all workflow runs (keep latest 3 per workflow)
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        KEEP=3
        CURRENT_RUN_ID="${{ github.run_id }}"
        echo "📋 开始清理所有工作流的运行记录，每个工作流保留最近 $KEEP 条。"
        runs_json=$(gh run list --limit 500 --json databaseId,workflowName)
        echo "$runs_json" | jq -c --argjson keep "$KEEP" '
          group_by(.workflowName) | .[] | {
            workflow: .[0].workflowName,
            to_delete: .[$keep:] | map(.databaseId)
          }
        ' | while read -r obj; do
          wf_name=$(echo "$obj" | jq -r '.workflow')
          to_delete=$(echo "$obj" | jq -r '.to_delete[]')
          if [ -z "$to_delete" ]; then
            echo "✅ 工作流 '$wf_name' 无需清理。"
            continue
          fi
          echo "▶️ 工作流: $wf_name，将删除以下旧记录："
          for run_id in $to_delete; do
            if [ "$run_id" == "$CURRENT_RUN_ID" ]; then
              echo "   ⏭️ 跳过当前运行 ID: $run_id"
              continue
            fi
            echo "   🗑️ 删除运行 ID: $run_id"
            gh run delete $run_id
          done
        done
        echo "✅ 清理完成！"
