name: Gaming4free Auto Renew

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write          # 👈 新增：删除运行记录必须的权限

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests

    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Setup Proxy Tunnel (Gost)
      env:
        PROXY_URL: ${{ secrets.PROXY }}
      run: |
        wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
        gunzip gost-linux-amd64-2.11.5.gz
        chmod +x gost-linux-amd64-2.11.5
        nohup ./gost-linux-amd64-2.11.5 -L :1080 -F "${PROXY_URL}" > gost.log 2>&1 &
        sleep 5
        curl -il -x socks5://127.0.0.1:1080 https://api.ipify.org

    # ----- 从私库拉取脚本（带认证） -----
    - name: Pull script from private repository
      env:
        REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
      run: |
        wget -q --header="Authorization: token ${REPO_TOKEN}" \
             https://raw.githubusercontent.com/gunqio/zhiyong/main/gaming4free.py \
             -O gaming4free.py
        ls -l gaming4free.py

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:1080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        SERVERS: ${{ secrets.SERVERS }}
      run: |
        xvfb-run -a python gaming4free.py

    # ============ 新增：清理旧运行记录（保留最近 3 条） ============
    - name: Cleanup old workflow runs (keep latest 3)
      if: always()          # 无论前面的步骤成功与否都执行清理
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        REPO="${{ github.repository }}"
        WORKFLOW_ID="${{ github.workflow }}"
        KEEP=3
        CURRENT_RUN_ID="${{ github.run_id }}"

        # 获取该工作流的所有运行 ID（按创建时间倒序）
        run_ids=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=100" | \
          jq -r '.workflow_runs[].id')

        # 转换为数组
        ids_array=($run_ids)
        total=${#ids_array[@]}

        echo "📋 工作流 '$WORKFLOW_ID' 共有 $total 条运行记录，将保留最近 $KEEP 条（包括当前运行）。"

        if [ $total -le $KEEP ]; then
          echo "✅ 记录数不超过 $KEEP，无需清理。"
          exit 0
        fi

        # 需要删除的 ID 列表（从第 KEEP+1 个到最后一个）
        to_delete=("${ids_array[@]:$KEEP}")

        echo "🗑️ 将删除 ${#to_delete[@]} 条旧记录（跳过当前运行 ID: $CURRENT_RUN_ID）。"

        for run_id in "${to_delete[@]}"; do
          # 跳过当前正在运行的记录（防止误删）
          if [ "$run_id" == "$CURRENT_RUN_ID" ]; then
            echo "⏭️ 跳过当前运行 ID: $run_id"
            continue
          fi
          echo "   🗑️ 删除运行 ID: $run_id"
          response=$(curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/runs/$run_id" -w "%{http_code}")
          if [ "$response" -eq 204 ]; then
            echo "   ✅ 删除成功"
          else
            echo "   ⚠️ 删除失败，HTTP 状态码: $response"
          fi
          sleep 0.5   # 避免 API 速率限制
        done

        echo "✅ 清理完成！"
