name: Gaming4free Auto Renew

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests

    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    # ==================== 使用 sing-box 搭建 SOCKS5 代理 ====================
    - name: Setup Proxy (sing-box)
      env:
        # PROXY_URL 请填入你的 VLESS 链接（建议移除 &ech=... 参数）
        PROXY_URL: ${{ secrets.PROXY }}
      run: |
        # 1. 下载 sing-box
        wget -q https://github.com/SagerNet/sing-box/releases/download/v1.8.6/sing-box-1.8.6-linux-amd64.tar.gz
        tar -xzf sing-box-1.8.6-linux-amd64.tar.gz
        sudo mv sing-box-1.8.6-linux-amd64/sing-box /usr/local/bin/
        chmod +x /usr/local/bin/sing-box

        # 2. 生成 sing-box 配置文件 (支持 VLESS + WebSocket)
        cat > /tmp/gen_config.py <<'EOF'
import os, json, sys
from urllib.parse import urlparse, parse_qs

proxy_url = os.environ.get('PROXY_URL', '')
if not proxy_url:
    print('PROXY_URL not set', file=sys.stderr)
    sys.exit(1)

parsed = urlparse(proxy_url)
protocol = parsed.scheme
host = parsed.hostname
port = parsed.port or 443
uuid = parsed.username
if not uuid:
    print('Missing UUID in PROXY_URL', file=sys.stderr)
    sys.exit(1)

query = parse_qs(parsed.query)
security = query.get('security', [''])[0]
sni = query.get('sni', [''])[0] or host
fp = query.get('fp', ['chrome'])[0]
flow = query.get('flow', [''])[0]
# 传输参数
transport_type = query.get('type', [''])[0]   # ws, tcp, etc.
ws_host = query.get('host', [''])[0]
ws_path = query.get('path', [''])[0]

# 忽略 ech 参数（sing-box 不支持，若服务器强制要求将无法使用）

outbound = {
    "type": protocol,
    "tag": "proxy",
    "server": host,
    "server_port": port,
    "uuid": uuid,
    "security": security if security else "none",
    "cipher": "auto",
    "tls": {
        "enabled": bool(security),
        "server_name": sni,
        "insecure": False,
        "utls": {
            "enabled": True,
            "fingerprint": fp
        }
    }
}
if protocol == 'vless' and flow:
    outbound['flow'] = flow

# 配置 WebSocket 传输
if transport_type == 'ws':
    outbound['transport'] = {
        "type": "ws",
        "path": ws_path or "/",
        "headers": {
            "Host": ws_host or host
        }
    }

config = {
    "log": {"level": "error"},
    "inbounds": [
        {
            "type": "socks",
            "tag": "socks-in",
            "listen": "127.0.0.1",
            "listen_port": 1080
        }
    ],
    "outbounds": [outbound],
    "route": {
        "rules": [
            {
                "outbound": "proxy",
                "network": ["tcp", "udp"]
            }
        ],
        "final": "proxy"
    }
}
with open('/tmp/config.json', 'w') as f:
    json.dump(config, f, indent=2)
EOF

        python3 /tmp/gen_config.py

        # 3. 后台启动 sing-box
        nohup sing-box run -c /tmp/config.json > sing-box.log 2>&1 &
        sleep 5

        # 4. 验证代理是否生效
        echo "🔍 测试代理连通性："
        curl -x socks5://127.0.0.1:1080 https://api.ipify.org -s -o /dev/null -w "出口IP: %{remote_ip}\n" || echo "⚠️ 代理测试失败，请检查 PROXY_URL 配置"
    # =====================================================================

    - name: Pull script from private repository
      env:
        REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
      run: |
        wget -q --header="Authorization: token ${REPO_TOKEN}" \
             https://raw.githubusercontent.com/gunqio/zhiyong/main/gaming4free.py \
             -O gaming4free.py
        ls -l gaming4free.py

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:1080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        SERVERS: ${{ secrets.SERVERS }}
      run: |
        xvfb-run -a python gaming4free.py

    # ==================== 清理旧运行记录（保持不变） ====================
    - name: Cleanup all workflow runs (keep latest 3 per workflow)
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        KEEP=3
        CURRENT_RUN_ID="${{ github.run_id }}"
        echo "📋 开始清理所有工作流的运行记录，每个工作流保留最近 $KEEP 条。"
        runs_json=$(gh run list --limit 500 --json databaseId,workflowName)
        echo "$runs_json" | jq -c --argjson keep "$KEEP" '
          group_by(.workflowName) | .[] | {
            workflow: .[0].workflowName,
            to_delete: .[$keep:] | map(.databaseId)
          }
        ' | while read -r obj; do
          wf_name=$(echo "$obj" | jq -r '.workflow')
          to_delete=$(echo "$obj" | jq -r '.to_delete[]')
          if [ -z "$to_delete" ]; then
            echo "✅ 工作流 '$wf_name' 无需清理。"
            continue
          fi
          echo "▶️ 工作流: $wf_name，将删除以下旧记录："
          for run_id in $to_delete; do
            if [ "$run_id" == "$CURRENT_RUN_ID" ]; then
              echo "   ⏭️ 跳过当前运行 ID: $run_id"
              continue
            fi
            echo "   🗑️ 删除运行 ID: $run_id"
            gh run delete $run_id
          done
        done
        echo "✅ 清理完成！"
