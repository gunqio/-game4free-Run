name: Minecraft Server Auto Renew with Proxy

on:
  workflow_dispatch: # 支持手动触发
  repository_dispatch: # 支持外部 API 触发 (cron-job.org)
    types: [renew_trigger]

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js 环境
      uses: actions/setup-node@v4
      with:
        node-version: '20' # 修正了这里的拼写错误

    - name: 安装项目依赖
      run: |
        npm init -y
        npm install playwright

    - name: 安装 Playwright 浏览器
      run: npx playwright install chromium --with-deps

    - name: 执行续期脚本
      env:
        # 你的 VLESS 节点链接，保存在 Actions Secrets 里
        MY_VLESS_PROXY: ${{ secrets.MY_VLESS_PROXY }}
      run: node renew.js

    - name: 上传运行截图
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: execution-screenshots
        path: |
          *.png
          xray.log
          config.json
        retention-days: 3
